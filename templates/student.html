<!DOCTYPE html>
<html>

<head>
<title>Student Dashboard</title>
</head>

<body>

<h1>Student Dashboard</h1>

<h2>Upload Leave Letter</h2>

<form action="/upload_leave"
      method="POST"
      enctype="multipart/form-data">

<input type="text"
       name="student_name"
       placeholder="Student Name"
       required>

<br><br>

<input type="file"
       name="leave_file"
       required>

<br><br>

<button type="submit">
Upload Leave Letter
</button>

</form>

</body>
</html>
