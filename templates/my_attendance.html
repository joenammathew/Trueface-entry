<!DOCTYPE html>
<html>
<head>
    <title>My Attendance</title>

    <style>

        body{
            font-family: Arial;
            background:#f5f5f5;
            padding:30px;
        }

        table{
            width:100%;
            border-collapse: collapse;
            background:white;
        }

        th, td{
            padding:12px;
            border:1px solid #ccc;
            text-align:center;
        }

        th{
            background:#007bff;
            color:white;
        }

        h2{
            text-align:center;
        }

    </style>

</head>
<body>

<h2>My Attendance</h2>

<table>

    <tr>
        <th>ID</th>
        <th>Reg No</th>
        <th>Name</th>
        <th>Branch</th>
        <th>Semester</th>
        <th>Subject</th>
        <th>Status</th>
        <th>Date</th>
        <th>Time</th>
    </tr>

    {% for row in data %}

    <tr>
        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
        <td>{{ row[3] }}</td>
        <td>{{ row[4] }}</td>
        <td>{{ row[5] }}</td>
        <td>{{ row[6] }}</td>
        <td>{{ row[7] }}</td>
        <td>{{ row[8] }}</td>
    </tr>

    {% endfor %}

</table>

</body>
</html>
