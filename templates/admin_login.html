<!DOCTYPE html>
<html>

<head>

<title>Admin Login</title>

<style>

body{
    font-family:Arial;
    background:#f0f2f5;
    text-align:center;
}

form{
    background:white;
    width:300px;
    margin:auto;
    margin-top:100px;
    padding:20px;
    border-radius:10px;
}

input{
    width:90%;
    padding:10px;
    margin:10px;
}

button{
    padding:10px 20px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
}

</style>

</head>

<body>

<form action="/admin_login_check"
      method="POST">

<h1>Admin Login</h1>

<input type="text"
       name="username"
       placeholder="Admin Name"
       required>

<input type="password"
       name="password"
       placeholder="Password"
       required>

<button type="submit">
Login
</button>

</form>

</body>
</html>
