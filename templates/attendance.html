<!DOCTYPE html>
<html>

<head>

<title>Attendance Sheet</title>

<style>

body{
    font-family:Arial;
    background:#f0f2f5;
    text-align:center;
}

table{
    margin:auto;
    border-collapse:collapse;
    width:90%;
    background:white;
}

th, td{
    border:1px solid black;
    padding:10px;
}

th{
    background:#007bff;
    color:white;
}

button{
    padding:10px 20px;
    margin:20px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
}

</style>

</head>

<body>

<h1>Attendance Sheet</h1>

<button onclick="window.print()">
Print Attendance
</button>

<table>

<tr>

<th>ID</th>
<th>Roll Number</th>
<th>Name</th>
<th>Date</th>
<th>Time</th>
<th>Status</th>

</tr>

{% for row in data %}

<tr>

<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
<td>{{ row[4] }}</td>
<td>{{ row[5] }}</td>

</tr>

{% endfor %}

</table>

</body>
</html>
