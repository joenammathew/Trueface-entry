<!DOCTYPE html>
<html>

<head>
<title>View Teachers</title>

<style>

body{
    font-family:Arial;
    background:#f2f2f2;
    text-align:center;
}

table{
    width:80%;
    margin:auto;
    border-collapse:collapse;
    background:white;
    margin-top:30px;
}

th, td{
    border:1px solid black;
    padding:10px;
}

th{
    background:#007bff;
    color:white;
}

button{
    padding:10px 15px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.delete-btn{
    background:red;
}

</style>

</head>

<body>

<h1>Teachers List</h1>

<a href="/admin">
<button>Back to Admin</button>
</a>

<table>

<tr>
    <th>ID</th>
    <th>Teacher Name</th>
    <th>Subject</th>
    <th>Password</th>
    <th>Action</th>
</tr>

{% for row in data %}

<tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}</td>

    <td>
        <a href="/delete_teacher/{{ row[0] }}"
           onclick="return confirm('Are you sure you want to delete this teacher?')">

           <button class="delete-btn">
               Delete
           </button>

        </a>
    </td>

</tr>

{% endfor %}

</table>

</body>
</html>
