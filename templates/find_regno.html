<!DOCTYPE html>
<html>

<head>

<title>Find Register Number</title>

<style>

body{
    font-family:Arial;
    background:#f0f2f5;
    text-align:center;
}

.container{
    width:400px;
    margin:auto;
    margin-top:80px;
    background:white;
    padding:30px;
    border-radius:10px;
}

input{
    width:90%;
    padding:10px;
    margin:10px;
}

button{
    padding:10px 20px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
}

</style>

</head>

<body>

<div class="container">

<h1>Find Register Number</h1>

<form action="/search_regno"
      method="POST">

<input type="text"
       name="name"
       placeholder="Enter Name"
       required>

<br>

<input type="text"
       name="rollno"
       placeholder="Enter Roll Number"
       required>

<br><br>

<button type="submit">

Find Register Number

</button>

</form>

</div>

</body>
</html>
