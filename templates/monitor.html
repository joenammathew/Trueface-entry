<!DOCTYPE html>
<html>
<head>
    <title>Live Monitoring</title>

    <style>
        body {
            background: black;
            color: white;
            text-align: center;
            font-family: Arial;
        }

        h1 {
            color: #00ff99;
        }

        .camera-box {
            width: 800px;
            height: 500px;
            margin: auto;
            border: 4px solid #00ff00;
            border-radius: 10px;
            overflow: hidden;
        }

        img {
            width: 100%;
            height: 100%;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #00ff99;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>

<body>

<h1>📷 Automatic Attendance Monitoring</h1>
<p>Click start to activate camera scanning</p>

<div class="camera-box">
    <img id="cam">
</div>

<button onclick="startCam()">Start Camera</button>
<img src="/video_feed" width="700" style="border:5px solid green;">
<script>
function startCam() {
    document.getElementById("cam").src = "/video_feed";
}
</script>

</body>
</html>
