<!DOCTYPE html>
<html>
<head>
<title>Leave Requests</title>

<style>
body{
    font-family:Arial;
    text-align:center;
    background:#f4f4f4;
}

table{
    width:95%;
    margin:auto;
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid black;
    padding:10px;
}

th{
    background:#007bff;
    color:white;
}

.btn{
    padding:8px 12px;
    border:none;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

.approve{background:green;}
.reject{background:red;}
</style>

</head>

<body>

<h2>Teacher Leave Requests</h2>

<table>

<tr>
<th>ID</th>
<th>RegNo</th>
<th>Name</th>
<th>Reason</th>
<th>From</th>
<th>To</th>
<th>Letter</th>
<th>Status</th>
<th>Approve</th>
<th>Reject</th>
</tr>

{% for row in data %}

<tr>

<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
<td>{{ row[4] }}</td>
<td>{{ row[5] }}</td>

<td>
<a href="/static/leave_letters/{{ row[6] }}" target="_blank">
View
</a>
</td>

<td>{{ row[7] }}</td>

<td>
<a href="/approve_leave/{{ row[0] }}">
<button class="btn approve">Accept</button>
</a>
</td>

<td>
<a href="/reject_leave/{{ row[0] }}">
<button class="btn reject">Reject</button>
</a>
</td>

</tr>

{% endfor %}

</table>

</body>
</html>
