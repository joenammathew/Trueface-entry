<!DOCTYPE html>
<html>
<head>
<title>Attendance Report</title>

<style>
body{font-family:Arial;text-align:center;background:#f4f4f4;}
table{width:90%;margin:auto;border-collapse:collapse;background:white;}
th,td{border:1px solid black;padding:10px;}
th{background:#007bff;color:white;}

.container{
    background:white;
    padding:20px;
    margin:20px auto;
    width:80%;
    border-radius:10px;
}
</style>
</head>

<body>

<h2>Attendance Report</h2>

<div class="container">

<!-- DAILY -->
<form action="/attendance_report" method="GET">
    <input type="hidden" name="type" value="daily">
    <input type="date" name="value" required>
    <button type="submit">View Daily</button>
</form>

<br>

<!-- MONTHLY -->
<form action="/attendance_report" method="GET">
    <input type="hidden" name="type" value="monthly">
    <input type="month" name="value" required>
    <button type="submit">View Monthly</button>
</form>

<br>

<!-- WEEKLY -->
<a href="/attendance_report?type=weekly">
    <button>View Weekly</button>
</a>

</div>

<hr>

<table>

<tr>
<th>Name</th>
<th>RegNo</th>
<th>Status</th>
<th>Date</th>
<th>Time</th>
</tr>

{% for row in data %}

<tr>
<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
<td>{{ row[4] }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
