<!DOCTYPE html>
<html>
<head>
<title>My Leave Requests</title>

<style>
body{font-family:Arial;text-align:center;background:#f2f2f2;}
table{width:90%;margin:auto;border-collapse:collapse;background:white;}
th,td{border:1px solid black;padding:10px;}
th{background:#007bff;color:white;}
</style>

</head>

<body>

<h2>My Leave Requests</h2>

<table>

<tr>
<th>ID</th>
<th>RegNo</th>
<th>Name</th>
<th>Reason</th>
<th>From</th>
<th>To</th>
<th>File</th>
<th>Status</th>
</tr>

{% for row in data %}

<tr>
<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
<td>{{ row[4] }}</td>
<td>{{ row[5] }}</td>

<td>
<a href="{{ url_for('static', filename='leave_letters/' + row[6]) }}" target="_blank">
View
</a>
</td>

<td>{{ row[7] }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
