<!DOCTYPE html>
<html>
<head>
    <title>Teacher Login</title>

    <style>
        body {
            font-family: Arial;
            background: #f0f2f5;
            text-align: center;
        }

        .box {
            width: 350px;
            margin: auto;
            margin-top: 100px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px;
            width: 95%;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .msg {
            color: red;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>Teacher Login</h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <p class="msg">{{ messages[0] }}</p>
      {% endif %}
    {% endwith %}

<form action="/teacher_login_check" method="POST">

<input type="text" name="username" placeholder="Teacher Name" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>
</div>

</body>
</html>
